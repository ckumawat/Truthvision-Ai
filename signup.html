<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthVision AI | Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Reusing Login Page styles for consistency */
        body.login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--color-bg-medium);
            padding-top: 0;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--color-bg-light);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 30px;
            color: var(--color-primary); 
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: var(--border-subtle);
            border-radius: 8px;
            font-size: 16px;
            background: var(--color-bg-dark);
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-light);
        }
        .message-box {
            color: var(--color-primary);
            margin-top: 10px;
            min-height: 20px;
        }
        .glow-button {
            width: 100%;
            margin-top: 15px;
        }
        .link-text {
            margin-top: 20px;
            font-size: 0.9em;
            color: var(--color-text-light);
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo" style="justify-content: center; margin-bottom: 15px;">
            <i class="fas fa-user-plus" style="font-size: 28px; color: var(--color-primary);"></i>
            <h1 style="font-size: 24px;">TruthVision Ai</h1>
        </div>
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <i class="fas fa-redo-alt"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            
            <p id="messageBox" class="message-box"></p>
            <button type="submit" class="glow-button"><i class="fas fa-user-plus"></i> Sign Up</button>
        </form>
        
        <p class="link-text">Already have an account? <a href="login.html">Log In here</a></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const signupForm = document.getElementById('signupForm');
            const messageBox = document.getElementById('messageBox');

            signupForm.addEventListener('submit', (e) => {
                e.preventDefault();
                messageBox.textContent = '';

                const email = document.getElementById('email').value;
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (password !== confirmPassword) {
                    messageBox.textContent = '❌ Passwords do not match!';
                    messageBox.style.color = '#dc3545';
                    return;
                }

                // Send signup request to server
                fetch('/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message === 'Signup successful') {
                        messageBox.textContent = '✅ Success! Account created. Redirecting to login...';
                        messageBox.style.color = '#28a745';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        messageBox.textContent = '❌ ' + data.message;
                        messageBox.style.color = '#dc3545';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    messageBox.textContent = '❌ Server error. Please try again.';
                    messageBox.style.color = '#dc3545';
                });
            });
        });
    </script>
</body>
</html>
