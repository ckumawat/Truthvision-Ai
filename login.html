<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthVision AI | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Essential styles to ensure the login box looks professional */
        body.login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--color-bg-medium); 
            margin: 0;
            overflow: hidden;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--color-bg-light); 
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-container h2 {
            margin-bottom: 25px;
            color: var(--color-primary);
            font-weight: 700;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-text-dark);
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: var(--color-primary);
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        .login-btn:hover {
            background: var(--color-secondary);
            transform: translateY(-2px);
        }
        #errorMessage {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }
        .signup-link {
            margin-top: 25px;
            display: block;
            color: var(--color-text-light);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .signup-link span {
            color: var(--color-primary);
            font-weight: bold;
        }
    </style>
</head>
<body class="login-body">
    
    <div class="login-container">
        <i class="fas fa-user-shield" style="font-size: 3.5rem; color: var(--color-primary); margin-bottom: 15px;"></i>
        <h2>TruthVision Ai</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Registered Email</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Sign In to Dashboard</button>
            <p id="errorMessage"></p>
        </form>

        <a href="signup.html" class="signup-link">New to TruthVision? <span>Create Account</span></a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');

            // 1. Session Check: Agar pehle se logged in hai to bypass login
            if (localStorage.getItem('isAuthenticated') === 'true') {
                window.location.href = 'index.html';
                return;
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Reset UI
                errorMessage.textContent = 'Authenticating...';
                errorMessage.style.color = 'var(--color-primary)';

                const email = emailInput.value;
                const password = passwordInput.value;

                try {
                    // 2. Actual API Call to your Node.js server
                    const response = await fetch('https://truthvision-ai.up.railway.app/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // 3. Success Logic
                        localStorage.setItem('isAuthenticated', 'true');
                        localStorage.setItem('user', JSON.stringify(data.user));
                        
                        errorMessage.textContent = 'Verification successful! Loading...';
                        errorMessage.style.color = '#28a745';

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        // 4. Server-side Error (Wrong Password/User Not Found)
                        errorMessage.textContent = '❌ ' + (data.message || 'Login Failed');
                        errorMessage.style.color = '#dc3545';
                    }
                } catch (error) {
                    // 5. Network Error (Server not running)
                    console.error('Connection Error:', error);
                    errorMessage.textContent = '❌ Connection failed. Ensure server.js is running.';
                    errorMessage.style.color = '#dc3545';
                }
            });
        });
    </script>
</body>
</html>
